<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dev Journey — Python Portal</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .active-tab { color: #10b981; border-top: 2px solid #10b981; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        input:focus { border-color: #10b981 !important; outline: none; }
        .stat-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; }
        #root { padding-bottom: 80px; } /* Space for bottom nav */
    </style>
</head>
<body class="selection:bg-emerald-500/30">

<div id="root" class="max-w-md mx-auto min-h-screen px-4 py-6"></div>
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm font-medium transition-all transform translate-y-[-100px] opacity-0 shadow-2xl"></div>

<script>
/* ================================================================
   FIREBASE CONFIGURATION
   ================================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBflRvtpP2DnKnoWCslON6CWIMgX34RvnQ",
  authDomain: "devjourney-portal.firebaseapp.com",
  projectId: "devjourney-portal",
  storageBucket: "devjourney-portal.firebasestorage.app",
  messagingSenderId: "837161815919",
  appId: "1:837161815919:web:5beaaa88b865bd8c60e29a"
};
const ADMIN_EMAIL = "devjourney2006@gmail.com";

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ===== DATA CONSTANTS ===== */
const CHAPTERS = ["How computers think", "Variables & data types", "Operators & user input", "Control flow — if/else", "Loops", "Functions", "Lists, dictionaries & final project"];

/* ===== GLOBAL STATE ===== */
const S = {
  user: null, profile: null, tab: 'home', authMode: 'login',
  announcements: [], exercises: [], submissions: [], students: [],
  settings: { ebookUrl:'', bookTitle:'Python for Absolute Beginners', cohortName:'Python Cohort 1' },
  progress: Array(7).fill(false), loading: true, modal: null, listeners: []
};

/* ===== CORE UTILS ===== */
function toast(msg, isError=false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm font-medium transition-all transform opacity-100 translate-y-0 shadow-2xl ${isError ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`;
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-100px)'; }, 2600);
}

function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

/* ===== RENDER ENGINE ===== */
function render() {
    const root = document.getElementById('root');
    if (S.loading) {
        root.innerHTML = `<div class="flex flex-col items-center justify-center h-[80vh] space-y-4">
            <div class="w-10 h-10 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium">Loading Portal...</p>
        </div>`;
        return;
    }

    if (!S.user) {
        root.innerHTML = renderAuth();
    } else {
        root.innerHTML = `
            ${renderHeader()}
            <main class="mt-6 mb-20 animate-in fade-in duration-500">
                ${S.profile?.isAdmin ? renderAdminContent() : renderStudentContent()}
            </main>
            ${renderBottomNav()}
        `;
    }
    if (S.modal) root.insertAdjacentHTML('beforeend', renderModal());
}

/* ===== UI COMPONENTS ===== */

function renderHeader() {
    return `
    <header class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-emerald-900/20">PJ</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">PyLearn</h1>
                <p class="text-xs text-slate-500">${S.profile?.isAdmin ? 'Instructor Access' : S.profile?.name}</p>
            </div>
        </div>
        <button onclick="doSignOut()" class="p-2 bg-slate-800/50 rounded-lg border border-slate-700 hover:bg-red-500/10 hover:border-red-500/50 transition-colors">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        </button>
    </header>`;
}

function renderBottomNav() {
    const items = S.profile?.isAdmin 
        ? [{id:'home', label:'Home', icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
           {id:'students', label:'Users', icon:'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z'},
           {id:'exercises', label:'Tasks', icon:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01'},
           {id:'submissions', label:'Grades', icon:'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z'}]
        : [{id:'home', label:'Home', icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
           {id:'ebook', label:'Books', icon:'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253'},
           {id:'exercises', label:'Exercises', icon:'M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z'}];

    return `
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 z-40 px-6 py-2">
        <div class="max-w-md mx-auto flex justify-between items-center">
            ${items.map(item => `
                <button onclick="setTab('${item.id}')" class="flex flex-col items-center p-2 transition-all ${S.tab === item.id ? 'active-tab' : 'text-slate-500'}">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${item.icon}" /></svg>
                    <span class="text-[10px] mt-1 font-medium">${item.label}</span>
                </button>
            `).join('')}
        </div>
    </nav>`;
}

/* ===== STUDENT VIEWS ===== */
function renderStudentContent() {
    if (S.tab === 'home') {
        const done = S.progress.filter(Boolean).length;
        const pct = Math.round((done / 7) * 100);
        return `
            <div class="stat-card p-6 mb-6">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p class="text-slate-400 text-sm font-medium">Course Progress</p>
                        <h2 class="text-3xl font-bold text-white">${pct}%</h2>
                    </div>
                    <span class="text-emerald-500 text-sm font-bold bg-emerald-500/10 px-3 py-1 rounded-full">${done}/7 Chapters</span>
                </div>
                <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                    <div class="bg-emerald-500 h-full transition-all duration-1000" style="width: ${pct}%"></div>
                </div>
            </div>

            <h3 class="text-lg font-bold mb-4 flex items-center">
                <span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>
                Announcements
            </h3>
            <div class="space-y-3">
                ${S.announcements.length ? S.announcements.map(a => `
                    <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl">
                        <p class="text-slate-300 text-sm leading-relaxed mb-2">${escHtml(a.text)}</p>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">${a.date}</span>
                    </div>
                `).join('') : '<p class="text-slate-500 text-sm italic">Nothing new from your instructor yet.</p>'}
            </div>
        `;
    }
    if (S.tab === 'ebook') return renderEbookView();
    if (S.tab === 'exercises') return renderStudentExercisesView();
    return '';
}

/* ===== ADMIN VIEWS ===== */
function renderAdminContent() {
    if (S.tab === 'home') {
        const ungraded = S.submissions.filter(s => !s.grade).length;
        return `
            <div class="grid grid-cols-3 gap-3 mb-8">
                <div class="stat-card p-4 text-center">
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">Students</p>
                    <p class="text-2xl font-bold text-white">${S.students.length}</p>
                </div>
                <div class="stat-card p-4 text-center">
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">Tasks</p>
                    <p class="text-2xl font-bold text-white">${S.exercises.length}</p>
                </div>
                <div class="stat-card p-4 text-center border-emerald-500/20">
                    <p class="text-emerald-500 text-[10px] uppercase font-bold tracking-widest mb-1">Review</p>
                    <p class="text-2xl font-bold text-emerald-400">${ungraded}</p>
                </div>
            </div>
            
            <h3 class="text-lg font-bold mb-4">Post Announcement</h3>
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl mb-6">
                <textarea id="ann-text" rows="3" class="w-full p-3 rounded-xl focus:ring-1 ring-emerald-500 placeholder:text-slate-600 text-sm mb-3" placeholder="Message your class..."></textarea>
                <button onclick="postAnnouncement()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-emerald-900/20">Broadcast Update</button>
            </div>
        `;
    }
    if (S.tab === 'students') return renderAdminStudentsList();
    if (S.tab === 'submissions') return renderAdminReviewList();
    if (S.tab === 'exercises') return renderAdminTasks();
    return '';
}

function renderAdminStudentsList() {
    return `
        <div class="space-y-4">
            <h3 class="text-lg font-bold">Class List</h3>
            ${S.students.map(s => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold text-emerald-500 border border-slate-700">${s.name[0]}</div>
                        <div>
                            <p class="font-bold text-sm">${escHtml(s.name)}</p>
                            <p class="text-xs text-slate-500">Joined ${s.joined}</p>
                        </div>
                    </div>
                    <button onclick="confirmDeleteStudent('${s.id}','${escHtml(s.name)}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('')}
        </div>
    `;
}

/* ===================================================================
   AUTHENTICATION VIEW (Classy Dark Mode)
   =================================================================== */
function renderAuth() {
    const isLogin = S.authMode === 'login';
    return `
    <div class="min-h-screen flex flex-col justify-center animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-emerald-600 rounded-2xl mx-auto flex items-center justify-center font-bold text-2xl text-white shadow-2xl shadow-emerald-500/20 mb-6 italic">DJ</div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">PyLearn Portal</h1>
            <p class="text-slate-500 mt-2 font-medium">Master Python with Dev Journey</p>
        </div>

        <div class="glass p-8 rounded-[2rem] shadow-2xl border-white/5">
            <div class="flex bg-slate-950 p-1.5 rounded-2xl mb-8">
                <button onclick="setAuthMode('login')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${isLogin ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500'}">Sign In</button>
                <button onclick="setAuthMode('register')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${!isLogin ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500'}">Create Account</button>
            </div>

            <div class="space-y-5">
                ${!isLogin ? `
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                    <input id="a-name" type="text" placeholder="John Doe" class="w-full px-5 py-4 rounded-2xl text-sm transition-all focus:ring-2 ring-emerald-500/20" />
                </div>` : ''}
                
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input id="a-email" type="email" placeholder="name@email.com" class="w-full px-5 py-4 rounded-2xl text-sm transition-all focus:ring-2 ring-emerald-500/20" />
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Secret Password</label>
                    <input id="a-pass" type="password" placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl text-sm transition-all focus:ring-2 ring-emerald-500/20" />
                </div>

                <p id="auth-err" class="text-red-400 text-xs font-medium text-center hidden"></p>

                <button onclick="${isLogin ? 'doLogin()' : 'doRegister()'}" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-xl shadow-emerald-900/30 transition-all active:scale-[0.98] mt-4">
                    ${isLogin ? 'Enter Portal' : 'Start Journey'}
                </button>
            </div>
        </div>
        <p class="text-center text-slate-600 text-xs mt-10 leading-relaxed uppercase tracking-tighter font-bold">Trusted by GCTU CS Students</p>
    </div>`;
}

/* ============= ALL YOUR ACTION FUNCTIONS (PASTED BACK IN) ============= */

async function doLogin() {
  const email = document.getElementById('a-email')?.value?.trim();
  const pass = document.getElementById('a-pass')?.value;
  if (!email || !pass) { showAuthErr('Please fill in all fields'); return; }
  try { await auth.signInWithEmailAndPassword(email, pass); }
  catch(e) { showAuthErr('Login failed. Check your details.'); }
}

async function doRegister() {
  const name = document.getElementById('a-name')?.value?.trim();
  const email = document.getElementById('a-email')?.value?.trim();
  const pass = document.getElementById('a-pass')?.value;
  if (!name || !email || !pass) { showAuthErr('Please fill in all fields'); return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const isAdmin = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    await db.collection('users').doc(cred.user.uid).set({
      name, email, isAdmin, banned: false,
      joined: new Date().toLocaleDateString('en-GB'),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { showAuthErr('Registration failed. Email might be in use.'); }
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  if (el) { el.textContent = msg; el.classList.remove('hidden'); }
}

async function doSignOut() {
  S.listeners.forEach(u => u()); S.listeners = [];
  await auth.signOut();
  S.user=null; S.profile=null; S.tab='home'; render();
}

async function postAnnouncement() {
  const text = document.getElementById('ann-text')?.value?.trim();
  if (!text) return toast('Type something first', true);
  try {
    await db.collection('announcements').add({
      text, date: new Date().toLocaleDateString('en-GB'),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('ann-text').value = '';
    toast('Announcement broadcasted!');
  } catch(e) { toast('Failed to post', true); }
}

function setTab(t) { S.tab = t; render(); window.scrollTo(0,0); }
function setAuthMode(m) { S.authMode = m; render(); }

/* ===================================================================
   FIREBASE LISTENERS & INITIALIZATION
   =================================================================== */
auth.onAuthStateChanged(async (user) => {
  S.listeners.forEach(u => u()); S.listeners = [];
  if (!user) { S.user=null; S.profile=null; S.loading=false; render(); return; }
  S.user = user;
  const profileSnap = await db.collection('users').doc(user.uid).get();
  if (!profileSnap.exists) { S.loading=false; render(); return; }
  const profile = profileSnap.data();
  if (profile.banned && !profile.isAdmin) { await auth.signOut(); return; }
  S.profile = profile;

  // Real-time Listeners
  S.listeners.push(db.collection('announcements').orderBy('createdAt','desc').onSnapshot(s => { S.announcements = s.docs.map(d=>({id:d.id,...d.data()})); render(); }));
  S.listeners.push(db.collection('exercises').orderBy('createdAt','desc').onSnapshot(s => { S.exercises = s.docs.map(d=>({id:d.id,...d.data()})); render(); }));
  
  if (profile.isAdmin) {
    S.listeners.push(db.collection('users').onSnapshot(s => { S.students = s.docs.map(d=>({id:d.id,...d.data()})).filter(u=>!u.isAdmin && !u.banned); render(); }));
    S.listeners.push(db.collection('submissions').orderBy('createdAt','desc').onSnapshot(s => { S.submissions = s.docs.map(d=>({id:d.id,...d.data()})); render(); }));
  } else {
    S.listeners.push(db.collection('submissions').where('studentId','==',user.uid).onSnapshot(s => { S.submissions = s.docs.map(d=>({id:d.id,...d.data()})); render(); }));
    const progSnap = await db.collection('progress').doc(user.uid).get();
    if (progSnap.exists) S.progress = progSnap.data().chapters || Array(7).fill(false);
  }

  S.loading = false; render();
});

render();
</script>
</body>
</html>
